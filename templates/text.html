<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Deepfake Detection</div>
        <div class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/text" class="active">Text</a></li>
            <li><a href="/image">Image</a></li>
            <li><a href="/voice">Voice</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="tool-card">
            <h2>Text Authenticity Check</h2>
            <p class="subtitle">Paste your text below to detect if it was written by an AI</p>
            
            <form id="detect-form" action="/predict_text" method="post">
                <div class="form-group">
                    <textarea name="text" class="text-input" rows="8" placeholder="Enter text to analyze..." required></textarea>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">
                    <i class="fas fa-file-alt btn-icon"></i>
                    <span class="btn-text">Analyze Text</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
